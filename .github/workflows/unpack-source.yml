name: Unpack source

on:
  push:
    branches:
      - main
    paths:
      - repo-source.tar.gz.b64
      - .github/workflows/unpack-source.yml

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unpack source files
        run: |
          base64 -d repo-source.tar.gz.b64 | tar -xz
          rm -f repo-source.tar.gz.b64
          rm -f .github/workflows/unpack-source.yml

      - name: Commit source files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Add oricham start LP source"
          git push
